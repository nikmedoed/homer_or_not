<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>nikmedoed's home</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./newtab.config.js"></script>
    <script src="./newtab.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <div class="top-actions" aria-label="Управление" data-i18n-attr="aria-label:topActions">
        <div id="topWeatherWidget" class="top-weather-widget hidden" aria-live="polite">
          <span id="topWeatherIcon" class="top-weather-icon" aria-hidden="true">☁</span>
          <span class="top-weather-primary">
            <span class="top-weather-title-row">
              <strong id="topWeatherTemp" class="top-weather-temp"></strong>
              <span id="topWeatherPlace" class="top-weather-place" data-i18n="weatherTitle">Погода</span>
            </span>
            <span id="topWeatherCondition" class="top-weather-condition"></span>
            <span class="top-weather-meta">
              <span id="topWeatherFeels"></span>
              <span id="topWeatherRange"></span>
              <span id="topWeatherHumidity"></span>
              <span id="topWeatherWind"></span>
              <span id="topWeatherRain"></span>
              <span id="topWeatherUpdated" class="top-weather-updated"></span>
            </span>
          </span>
          <button
            id="topWeatherRefreshButton"
            class="icon-button top-weather-refresh"
            type="button"
            title="Обновить погоду"
            data-i18n-attr="title:refreshWeather"
          >
            ↻
          </button>
        </div>
        <button id="statusButton" class="status-button" type="button" title="Статус Homer" data-i18n-attr="title:homerStatus">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">local</span>
        </button>
        <button id="syncButton" class="icon-button" type="button" title="Обновить Homer" data-i18n-attr="title:syncHomer">↻</button>
        <div id="modeSwitcher" class="mode-switcher" role="group" aria-label="Режим отображения" data-i18n-attr="aria-label:viewMode">
          <button class="mode-button" type="button" data-mode="full" title="Полный" data-i18n-attr="title:viewModeFull">▦</button>
          <button class="mode-button" type="button" data-mode="base" title="База" data-i18n-attr="title:viewModeBase">▥</button>
          <button class="mode-button" type="button" data-mode="zen" title="Дзен" data-i18n-attr="title:viewModeZen">○</button>
        </div>
        <button id="settingsButton" class="icon-button" type="button" title="Настройки" data-i18n-attr="title:settings">⚙</button>
      </div>

      <section class="launch-panel" aria-label="Поиск и быстрые ссылки" data-i18n-attr="aria-label:launchPanel">
        <form id="searchForm" class="search-row" autocomplete="off">
          <input
            id="searchInput"
            class="search-input"
            name="q"
            type="search"
            placeholder="Что ищем?"
            data-i18n-attr="placeholder:searchPlaceholder"
            spellcheck="false"
          />
          <div id="searchButtons" class="search-buttons" aria-label="Поисковые сервисы" data-i18n-attr="aria-label:searchServices"></div>
        </form>
        <nav id="quickLinks" class="quick-links" aria-label="Быстрые ссылки" data-i18n-attr="aria-label:quickLinks"></nav>
      </section>

      <section class="services-area" aria-label="Homer и посещённые сайты" data-i18n-attr="aria-label:servicesArea">
        <div id="servicesLayout" class="services-layout">
          <div id="servicesGrid" class="services-grid"></div>
          <section id="githubTrending" class="github-trending hidden" aria-label="GitHub Trending" data-i18n-attr="aria-label:githubTrending">
            <header class="github-trending-header">
              <h2 data-i18n="githubTrending">GitHub Trending</h2>
              <div id="githubTrendingMeta" class="github-trending-meta"></div>
              <button
                id="githubTrendingRefreshButton"
                class="icon-button github-trending-refresh"
                type="button"
                title="Обновить GitHub Trending"
                data-i18n-attr="title:refreshGithubTrending"
              >
                ↻
              </button>
            </header>
            <div id="githubTrendingList" class="github-trending-list"></div>
          </section>
          <section id="weatherWidget" class="weather-widget hidden" aria-live="polite">
            <div class="weather-main">
              <div id="weatherIcon" class="weather-icon" aria-hidden="true">☁</div>
              <div class="weather-primary">
                <div class="weather-title-row">
                  <strong id="weatherTemp" class="weather-temp"></strong>
                  <span id="weatherPlace" class="weather-place" data-i18n="weatherTitle">Погода</span>
                </div>
                <div id="weatherCondition" class="weather-condition"></div>
                <div class="weather-meta">
                  <span id="weatherFeels"></span>
                  <span id="weatherRange"></span>
                  <span id="weatherHumidity"></span>
                  <span id="weatherWind"></span>
                  <span id="weatherRain"></span>
                </div>
              </div>
              <button
                id="weatherRefreshButton"
                class="icon-button weather-refresh"
                type="button"
                title="Обновить погоду"
                data-i18n-attr="title:refreshWeather"
              >
                ↻
              </button>
            </div>
            <div id="weatherUpdated" class="weather-updated"></div>
          </section>
          <aside id="frequentPanel" class="visit-panel frequent-panel" aria-label="Часто посещаемые" data-i18n-attr="aria-label:frequentVisits">
            <h2 class="visit-heading" data-i18n="frequentVisits">Часто посещаемые</h2>
            <div id="frequentList" class="visit-list"></div>
          </aside>
          <aside id="historyPanel" class="visit-panel history-panel" aria-label="Последние посещённые" data-i18n-attr="aria-label:recentVisits">
            <h2 class="visit-heading" data-i18n="recentVisits">Последние посещённые</h2>
            <div id="historyList" class="visit-list"></div>
          </aside>
        </div>
      </section>
    </main>

    <div id="settingsOverlay" class="settings-overlay hidden">
      <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <header class="settings-header">
          <h1 id="settingsTitle" data-i18n="settings">Настройки</h1>
          <button id="closeSettingsButton" class="icon-button" type="button" title="Закрыть" data-i18n-attr="title:close">×</button>
        </header>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2 data-i18n="search">Поиск</h2>
            <button id="addEngineButton" class="secondary-button" type="button" data-i18n="add">Добавить</button>
          </div>
          <div id="engineRows" class="settings-rows"></div>
        </section>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2 data-i18n="quickLinks">Быстрые ссылки</h2>
            <button id="addQuickLinkButton" class="secondary-button" type="button" data-i18n="add">Добавить</button>
          </div>
          <div id="quickLinkRows" class="settings-rows"></div>
        </section>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2 data-i18n="centralColumn">Центральная колонка</h2>
          </div>
          <div id="widgetRows" class="settings-rows"></div>
          <div class="settings-section-actions">
            <button id="addRssButton" class="secondary-button" type="button" data-i18n="addRss">Добавить RSS</button>
          </div>
        </section>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2 data-i18n="weather">Погода</h2>
          </div>
          <div class="field-grid">
            <label>
              <span data-i18n="weatherLocation">Город или координаты для этой машины</span>
              <input
                id="weatherLocationInput"
                type="text"
                placeholder="Пусто: брать геолокацию браузера"
                data-i18n-attr="placeholder:weatherLocationPlaceholder"
              />
            </label>
            <label class="check-field">
              <input id="topWeatherEnabledInput" type="checkbox" />
              <span data-i18n="topWeatherEnabled">Показывать верхнюю погоду</span>
            </label>
            <label>
              <span data-i18n="topWeatherPlacement">Верхняя погода</span>
              <select id="topWeatherPlacementInput">
                <option value="actions" data-i18n="topWeatherPlacementActions">Как сейчас</option>
                <option value="center" data-i18n="topWeatherPlacementCenter">По центру экрана</option>
              </select>
            </label>
          </div>
        </section>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2 data-i18n="visits">Посещения</h2>
          </div>
          <div class="field-grid">
            <label>
              <span data-i18n="historyPool">Сколько записей истории смотреть</span>
              <input id="frequentHistoryPoolInput" type="number" min="50" max="50000" step="50" />
            </label>
            <label>
              <span data-i18n="minVisits">Минимум посещений для частых</span>
              <input id="frequentMinVisitsInput" type="number" min="2" max="1000" step="1" />
            </label>
            <label class="check-field">
              <input id="showFrequentVisitsInput" type="checkbox" />
              <span data-i18n="showFrequentVisits">Показывать часто посещаемые</span>
            </label>
            <label class="check-field">
              <input id="showRecentVisitsInput" type="checkbox" />
              <span data-i18n="showRecentVisits">Показывать последние посещённые</span>
            </label>
          </div>
        </section>

        <footer class="settings-footer">
          <button id="exportSettingsButton" class="secondary-button" type="button" data-i18n="exportSettings">Выгрузить настройки</button>
          <label class="secondary-button import-button">
            <span data-i18n="importSettings">Загрузить настройки</span>
            <input id="importSettingsInput" type="file" accept="application/json,.json" />
          </label>
          <button id="resetButton" class="secondary-button danger-button" type="button" data-i18n="reset">Сбросить</button>
          <button id="saveButton" class="primary-button" type="button" data-i18n="save">Сохранить</button>
        </footer>
        <div class="settings-credit" aria-label="Автор">
          <span>Сделал Никита Муромцев</span>
          <a href="https://nikmedoed.com/" target="_blank" rel="noreferrer">nikmedoed.com</a>
          <a href="https://x.com/nikmeoded" target="_blank" rel="noreferrer">@nikmeoded</a>
        </div>
      </div>
    </div>
  </body>
</html>
